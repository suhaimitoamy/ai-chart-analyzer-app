name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Patch launcher resources
        run: |
          rm -f app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          rm -f app/src/main/res/mipmap-xxxhdpi/ic_launcher_round.png
          python3 - <<'PY'
          from pathlib import Path
          manifest = Path('app/src/main/AndroidManifest.xml')
          text = manifest.read_text()
          text = text.replace('android:icon="@mipmap/ic_launcher"', 'android:icon="@drawable/ic_launcher_xau"')
          text = text.replace('android:roundIcon="@mipmap/ic_launcher_round"', 'android:roundIcon="@drawable/ic_launcher_xau"')
          manifest.write_text(text)
          PY

      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-configuration-cache --stacktrace

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Chart-Analyzer-APK
          path: app/build/outputs/apk/debug/app-debug.apk
