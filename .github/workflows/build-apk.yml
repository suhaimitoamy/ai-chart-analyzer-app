name: Android CI Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Memungkinkan build manual dari web GitHub

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Karena proyek ini belum memiliki file gradlew bawaan,
      # kita generate wrapper-nya dulu secara otomatis di server GitHub
      - name: Generate Gradle Wrapper
        run: gradle wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Chart-Analyzer-APK
          path: app/build/outputs/apk/debug/app-debug.apk
